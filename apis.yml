  humanURL: https://developers.f6s.com/
  properties:
  - url: https://developers.f6s.com/
    type: Documentation
  description: >-
    The F6S API provides programmatic access to the F6S platform, the world's largest
    startup and founder community. It enables developers to integrate with F6S's core
    capabilities including application management, program discovery, startup profiles,
    funding opportunities, and community data. The API supports authentication via
    OAuth and exposes endpoints for managing accelerator and grant program applications,
    querying startup and founder profiles, and accessing deals and job listings across
    the global F6S network of over 1.6 million tech startups and 2.9 million entrepreneurs.
